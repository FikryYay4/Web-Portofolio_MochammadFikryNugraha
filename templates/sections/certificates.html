<section class="section certificates" id="certificates">
    <div class="container">
        <div class="section-header">
            <span class="section-header__badge">Certifications</span>
            <h2 class="section-header__title">Official Certifications</h2>
            <p class="section-header__subtitle">Recognized credentials and qualifications</p>
        </div>
<div class="certificates__grid">
            <!-- BNSP Graphic Design Depan -->
            <div class="cert-item cert-zoom">
                <img src="{{ url_for('static', filename='uploads/certificates/bnsp_graphic_depan.jpg') }}" alt="BNSP Graphic Design Front" onclick="openCertModal(this)">
                <p class="cert-caption">BNSP Graphic Design (Front)</p>
            </div>
            <!-- BNSP Graphic Design Belakang -->
            <div class="cert-item cert-zoom">
                <img src="{{ url_for('static', filename='uploads/certificates/bnsp_graphic_belakang.jpg') }}" alt="BNSP Graphic Design Back" onclick="openCertModal(this)">
                <p class="cert-caption">BNSP Graphic Design (Back)</p>
            </div>
            <!-- Telkom Graphic Design -->
            <div class="cert-item cert-zoom">
                <img src="{{ url_for('static', filename='uploads/certificates/telkom_graphic.jpg') }}" alt="Telkom Graphic Design Certificate" onclick="openCertModal(this)">
                <p class="cert-caption">Telkom Graphic Design Training</p>
            </div>
            <!-- Data Analyst KarirNext -->
            <div class="cert-item cert-zoom">
                <img src="{{ url_for('static', filename='uploads/certificates/WhatsApp Image 2026-07-10 at 16.42.20.jpeg') }}" alt="Data Analyst KarirNext" onclick="openCertModal(this)">
                <p class="cert-caption">Data Analyst KarirNext 2026</p>
            </div>
            <!-- BNSP Network Engineering Depan -->
            <div class="cert-item cert-zoom">
                <img src="{{ url_for('static', filename='uploads/certificates/bnsp_network_depan.jpg') }}" alt="BNSP Network Engineering Front" onclick="openCertModal(this)">
                <p class="cert-caption">BNSP Network Engineering (Front)</p>
            </div>
            <!-- BNSP Network Engineering Belakang -->
            <div class="cert-item cert-zoom">
                <img src="{{ url_for('static', filename='uploads/certificates/bnsp_network_belakang.jpg') }}" alt="BNSP Network Engineering Back" onclick="openCertModal(this)">
                <p class="cert-caption">BNSP Network Engineering (Back)</p>
            </div>
        </div>
    </div>
</section>
