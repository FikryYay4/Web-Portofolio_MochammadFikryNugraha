<section class="section contact" id="contact">
    <div class="container">
        <div class="section-header">
            <span class="section-header__badge">Contact</span>
            <h2 class="section-header__title">Let's Talk</h2>
            <p class="section-header__subtitle">Have a project in mind? Let's work together</p>
        </div>

        <div class="contact__grid">
            <div class="contact__info reveal">
                <h3 class="contact__info-title">Get In Touch</h3>
                <p class="contact__info-text">Feel free to reach out for collaborations, opportunities, or just a friendly hello!</p>

                <div class="contact__detail">
                    <div class="contact__detail-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <span>nugrahafikry2@gmail.com</span>
                </div>

                <div class="contact__detail">
                    <div class="contact__detail-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    </div>
                    <span>Bandung, Indonesia</span>
                </div>

                <div class="contact__socials">
                    <a href="https://www.linkedin.com/in/mochammad-fikry-nugraha-75636338a" target="_blank" rel="noopener noreferrer" class="footer__social-link" aria-label="LinkedIn">
                        <img src="{{ url_for('static', filename='assets/svg/social/DeviconLinkedin.svg') }}" alt="LinkedIn" width="24" height="24">
                    </a>
                    <a href="https://github.com/FikryYay4" target="_blank" rel="noopener noreferrer" class="footer__social-link" aria-label="GitHub">
                        <img src="{{ url_for('static', filename='assets/svg/social/github-142-svgrepo-com.svg') }}" alt="GitHub" width="24" height="24">
                    </a>
                    <a href="https://www.instagram.com/mochammadfikryn12?igsh=N3dmOWl6bTZ0MDlq" target="_blank" rel="noopener noreferrer" class="footer__social-link" aria-label="Instagram">
                        <img src="{{ url_for('static', filename='assets/svg/social/SkillIconsInstagram.svg') }}" alt="Instagram" width="24" height="24">
                    </a>
                    <a href="mailto:nugrahafikry2@gmail.com" class="footer__social-link" aria-label="Email">
                        <img src="{{ url_for('static', filename='assets/svg/social/LogosGoogleGmail.svg') }}" alt="Email" width="24" height="24">
                    </a>
                </div>
            </div>

            <form class="contact__form glass-card reveal" action="{{ url_for('public.contact') }}" method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" name="name" class="form-input" placeholder="Your name" autocomplete="name" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="subject" class="form-label">Subject</label>
                    <input type="text" id="subject" name="subject" class="form-input" placeholder="Project inquiry" autocomplete="subject">
                </div>
                <div class="form-group">
                    <label for="message" class="form-label">Message</label>
                    <textarea id="message" name="message" class="form-input form-textarea" rows="5" placeholder="Tell me about your project..." autocomplete="off" required></textarea>
                </div>
                <button type="submit" class="btn btn--primary btn--full">Send Message</button>
            </form>
        </div>
    </div>
</section>
