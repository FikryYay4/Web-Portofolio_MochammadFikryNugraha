{% extends 'base.html' %}
{% block title %}Add Project{% endblock %}

{% block content %}
<div class="dashboard">
    <div class="dashboard__header">
        <h1 class="dashboard__title">Add Project</h1>
        <a href="{{ url_for('admin.projects_list') }}" class="btn btn--ghost">Back</a>
    </div>

    <form class="dashboard__form glass-card" action="{{ url_for('admin.project_create') }}" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="title" class="form-label">Title *</label>
            <input type="text" id="title" name="title" class="form-input" required>
        </div>
        <div class="form-group">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" name="description" class="form-input form-textarea" rows="4"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="year" class="form-label">Year</label>
                <input type="text" id="year" name="year" class="form-input" placeholder="2024">
            </div>
            <div class="form-group">
                <label for="technology" class="form-label">Technologies (comma separated)</label>
                <input type="text" id="technology" name="technology" class="form-input" placeholder="Python, Flask, HTML">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="category" class="form-label">Category</label>
                <input type="text" id="category" name="category" class="form-input" placeholder="Web Development">
            </div>
            <div class="form-group">
                <label for="order" class="form-label">Order</label>
                <input type="number" id="order" name="order" class="form-input" value="0">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="link_demo" class="form-label">Demo URL</label>
                <input type="url" id="link_demo" name="link_demo" class="form-input">
            </div>
            <div class="form-group">
                <label for="link_github" class="form-label">GitHub URL</label>
                <input type="url" id="link_github" name="link_github" class="form-input">
            </div>
        </div>
        <div class="form-group">
            <label for="featured" class="form-label">
                <input type="checkbox" id="featured" name="featured" style="margin-right: 0.5rem;"> Featured Project
            </label>
        </div>
        <div class="form-group">
            <label for="thumbnail" class="form-label">Thumbnail (cover image)</label>
            <input type="file" id="thumbnail" name="thumbnail" class="form-input form-file" accept="image/*,video/mp4">
        </div>
        <div class="form-group">
            <label for="images" class="form-label">Additional Images (for layer-stack slider)</label>
            <input type="file" id="images" name="images" class="form-input form-file" accept="image/*" multiple>
            <p class="form-hint" style="color:var(--text-secondary);font-size:0.85rem;margin-top:4px;">You can select multiple images. They will appear as a stacked layer in the project card.</p>
        </div>
        <button type="submit" class="btn btn--primary">Save Project</button>
    </form>
</div>
{% endblock %}
