<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dashboard-body">
    <div class="login-page">
        <div class="login-card glass-card">
            <div class="login-header">
                <div class="login-logo">
                    <span class="login-logo__text">MFN</span>
                </div>
                <h1 class="login-title">Admin Panel</h1>
                <p class="login-subtitle">Sign in to manage your portfolio</p>
            </div>


            <form class="login-form" action="{{ url_for('admin.login') }}" method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <div class="form-input-wrapper">
                        <svg class="form-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="username" name="username" class="form-input form-input--icon" placeholder="Enter username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="form-input-wrapper">
                        <svg class="form-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="password" name="password" class="form-input form-input--icon" placeholder="Enter password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn btn--primary btn--full login-btn">
                    <span>Sign In</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                </button>
            </form>

        </div>
    </div>

    <script>
        // Subtle particle background for login page
        document.addEventListener('DOMContentLoaded', () => {
            const loginPage = document.querySelector('.login-page');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'login-particle';
                particle.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation-delay: ${Math.random() * 6}s;
                    animation-duration: ${4 + Math.random() * 4}s;
                `;
                loginPage.appendChild(particle);
            }
        });
    </script>
</body>
</html>
