<section class="section language-cert" id="language-cert">
    <div class="container">
        <div class="section-header">
            <span class="section-header__badge">Language Proficiency</span>
            <h2 class="section-header__title">English Certifications</h2>
            <p class="section-header__subtitle">Standardized English proficiency test scores</p>
        </div>
        <div class="cert-english__wrapper">
            <div class="cert-item cert-zoom cert-english__item">
                <img src="{{ url_for('static', filename='uploads/certificates/toefl.jpg') }}" alt="TOEFL Certificate" onclick="openCertModal(this)" class="cert-english__img">
                <p class="cert-caption">TOEFL (Test of English as a Foreign Language)</p>
            </div>
            <div class="cert-item cert-zoom cert-english__item">
                <img src="{{ url_for('static', filename='uploads/certificates/toeic.jpg') }}" alt="TOEIC Certificate" onclick="openCertModal(this)" class="cert-english__img">
                <p class="cert-caption">TOEIC (Test of English for International Communication)</p>
            </div>
        </div>
    </div>
</section>
